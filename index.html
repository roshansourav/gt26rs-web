<!DOCTYPE html>
<html lang="en">
<head>

  <!-- seo -->
    <meta name="author" content="GT26RS 'gt26rs'">
    <meta name="description" content="gt26rs">
    <meta name="keywords" content="gaming,android,games">

    <!-- open graph -->
    <meta property="og:title" content="gt26rs">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://gt26rs.com/bird1.png">
    <meta property="og:description"
        content="GT26RS">
    <meta property="og:url" content="https://gt26rs.com">
    <meta property="og:locale" content="en_US">
    <meta property="og:site_name" content="gt26rs.com">

    <!-- display -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jumpy Game</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

    body {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      overflow-x: hidden;
    }

    .glass {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    header { padding: 20px; display: flex; justify-content: space-between; }
    .logo { font-size: 28px; font-weight: bold; letter-spacing: 2px; }

    .hero {
      height: 90vh; /* allows next section peek */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero h1 {
      font-size: 64px;
      background: linear-gradient(90deg, #00f2fe, #4facfe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      z-index: 2;
    }

    .hero p { margin-top: 20px; opacity: 0.85; z-index: 2; }

    .hero img.main-bird {
      width: 180px;
      margin-bottom: 20px;
      animation: floatBird 3s infinite ease-in-out;
      z-index: 2;
    }

    @keyframes floatBird {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
      100% { transform: translateY(0px); }
    }

    /* Floating creatures */
    .floating {
      position: absolute;
      pointer-events: none;
      opacity: 0.8;
      animation: drift linear infinite;
    }

    @keyframes drift {
      0% { transform: translateY(0) translateX(0) rotate(0deg); }
      50% { transform: translateY(-60px) translateX(40px) rotate(10deg); }
      100% { transform: translateY(0) translateX(0) rotate(0deg); }
    }

    /* Dreamy scroll indicator */
    .scroll-indicator {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 3;
      animation: glowPulse 2s infinite ease-in-out;
    }

    .scroll-indicator span {
      font-size: 14px;
      opacity: 0.8;
      letter-spacing: 2px;
    }

    .scroll-indicator .arrow {
      font-size: 26px;
      margin-top: 5px;
      display: block;
      animation: bounce 1.5s infinite;
      text-shadow: 0 0 10px #00f2fe, 0 0 20px #4facfe;
    }

    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(10px); }
    }

    @keyframes glowPulse {
      0%,100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* gradient fade */
    .hero::after {
      content: '';
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 120px;
      background: linear-gradient(transparent, #203a43);
    }

    .section { padding: 80px 20px; display: flex; justify-content: center; }
    .card { width: 90%; max-width: 1000px; padding: 40px; }

    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .feature-box {
      padding: 20px;
      border-radius: 15px;
      background: rgba(255,255,255,0.05);
      transition: 0.3s;
      text-align: center;
    }

    .feature-box img { width: 60px; margin-bottom: 10px; }
    .feature-box:hover { transform: translateY(-10px); }

    footer { text-align: center; padding: 30px; opacity: 0.7; }
  </style>
</head>
<body>

  <header>
    <div class="logo">JUMPY</div>
  </header>

  <section class="hero" id="hero">
    <img src="bird1.png" class="main-bird" alt="Bird">
    <h1>Fly. Dodge. Survive.</h1>
    <p>Collect fruits 🍑 and avoid wolves 🐺</p>

    <div class="scroll-indicator">
      <span>SCROLL</span>
      <div class="arrow">⬇</div>
    </div>
  </section>

  <section class="section">
    <div class="card glass">
      <h2>About the Game</h2>
      <p style="margin-top:20px; opacity:0.8;">
        Control your bird, collect fruits, and avoid deadly wolves. The longer you survive, the higher your score.
      </p>
    </div>
  </section>

  <section class="section">
    <div class="card glass">
      <h2>Features</h2>
      <div class="features">
        <div class="feature-box">
          <img src="bird1.png">
          Smooth Bird Movement
        </div>
        <div class="feature-box">
          <img src="f_29.png">
          Fruit Collection System
        </div>
        <div class="feature-box">
          <img src="wolf_16.png">
          Enemy Avoidance
        </div>
      </div>
    </div>
  </section>

  <footer>© 2026 Jumpy Game</footer>

  <script>
    const hero = document.getElementById('hero');

    const assets = ['f_01.png', 'f_02.png', 'f_03.png', 'f_04.png', 'f_05.png', 'f_06.png', 'f_07.png', 'f_08.png', 'f_09.png', 'f_10.png', 'f_11.png', 'f_12.png', 'f_13.png', 'f_14.png', 'f_15.png', 'f_29.png', 'wolf_16.png'];

    function createFloating() {
      const el = document.createElement('img');
      el.src = assets[Math.floor(Math.random() * assets.length)];
      el.className = 'floating';

      const size = Math.random() * 60 + 40;
      el.style.width = size + 'px';

      el.style.left = Math.random() * 100 + '%';
      el.style.top = Math.random() * 100 + '%';

      const duration = Math.random() * 10 + 8;
      el.style.animationDuration = duration + 's';

      hero.appendChild(el);
    }

    // create multiple floating elements
    for (let i = 0; i < 12; i++) {
      createFloating();
    }

    // subtle auto scroll hint
    setTimeout(() => {
      window.scrollBy({ top: 80, behavior: 'smooth' });
    }, 2500);
  </script>

</body>
</html>
